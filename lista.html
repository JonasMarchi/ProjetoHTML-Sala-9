<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /*Cabeçalho principal*/
        h1{
            font-size: 2.5rem;
            color: #00bcd4;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
        h2{
            font-size: 1.8rem;
            color: #00bcd4;
            margin: 20px 0;
            text-transform: uppercase;
        }
        ol, ul, dl{
            margin: 0;
            padding: 0;
            list-style-position: inside;
            width: 100%;
            max-width: 600px;
        }
        ol li, ul li{
            background-color: #ffffff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0);
        }
        ol li:hover, ul li:hover{
            transform: translate(-5px);
            background-color: #00bcd4;
            color: #ffffff;
        }
        /*lista de definição*/
        d1 dt{
            font-weight: bold;
            color: #00bcd4;
            margin-top: 20px;
        }
        d1 dd{
            padding: 8px 16 px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 8px;
            transition: transfomr 0.3s ease, background-color 0.3s ease;
        }
        d1 dd:hover{
            transform:translateY(-5px);
            background-color: #00bcd4;
            color: #fff;
        }
        h1, h2, ol li, ul li, d1 dd{
            transition: transfomr 0.3s ease, box-shadow 0.3s ease;
        }
        h1:hover, h2:hover, ol li:hover, ul li:hover, d1 dd:hover{
            box-shadow: 0 6px 12px rgba(0, 188, 212, 0.3,);
        }
    </style>
</head>
<body>
    <h1>Listas</h1>

    <!-- Lista ordenada -->
     <h2>Arovados</h2>
     <!-- ol é a estrutura onde estao todos os componenetes de uma lista -->
     <ol>
        <li>Bia</li>
        <li>Pedro</li>
        <li>Ana</li>
        <li>João</li>
    <ol>
            <!-- Lista não ordenada -->
    <ul>
        <li>Queijo</li>
        <li>Leite</li>
        <li>Arroz</li>
        <li>Pão</li>
    </ul>

    <!-- Lista de definição -->
    <h2>Principais termos do glossário de Cloud Computing</h2>
    <dl>
        <dt>BaaS</dt>
        <dd>Backend Como Serviço</dd>
        <dt>IaaS</dt>
        <dd>Infraestrutura Como Serviço</dd>
        <dt>SaaS</dt>
        <dd>Software Como Serviço</dd>
    </dl>
</body>
</html>
